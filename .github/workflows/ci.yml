name: CI

on:
  push:
    branches: [main]
  # `pull_request` (NOT `pull_request_target`) is intentional. The
  # plain trigger runs fork PRs with a read-only GITHUB_TOKEN and
  # no access to secrets тАФ safe given the workflow runs untrusted
  # Nix evaluation. `pull_request_target` would check out the PR
  # head while running with the *base* repo's token тАФ the classic
  # supply-chain footgun. Do not change without considering token
  # scope and what the workflow runs.
  pull_request:

# Default to read-only for all jobs. CI runs untrusted code from
# fork PRs (Nix evaluation, Go builds, VM tests); a least-privilege
# GITHUB_TOKEN limits blast radius if a flake input or action is
# compromised. Override per-job if a step ever needs to write.
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Each job caches /nix/store via nix-community/cache-nix-action so
# subsequent runs don't have to re-fetch every nixpkgs derivation
# (the VM test machinery alone is multi-GB). The cache key is
# `(os, arch, job, flake.lock)` so a lockfile bump cleanly retires
# stale stores; restore-prefix lets a near-miss warm-restore from
# any earlier same-job cache. Purge keeps the GHA cache budget
# (10 GB / repo) under control by dropping older same-prefix
# entries.
jobs:
  format:
    name: format check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          purge-created: 0
          purge-primary-key: never
      - name: Apply formatter
        run: nix fmt
      - name: Verify no formatting drift
        run: git diff --exit-code

  # `go mod` hygiene. The daemon's deps are vendored under
  # `daemon/vendor/` and every flake check runs Go with
  # `-mod=vendor`, which checks vendor/ against go.mod but never
  # re-derives go.mod itself тАФ so a stale `// indirect` annotation
  # or an unused `require` passes every other job untouched.
  # `go mod tidy -diff` re-derives go.mod/go.sum and exits
  # non-zero if they would change; `go mod verify` confirms the
  # module cache matches go.sum. This needs network тАФ the pruned
  # module graph is not vendored тАФ so unlike the daemon checks it
  # runs as a plain job, not a hermetic flake check, the same
  # shape as the `format` drift gate above.
  go-mod:
    name: go.mod hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          purge-created: 0
          purge-primary-key: never
      - name: Verify modules against go.sum
        run: nix develop --command bash -c 'cd daemon && go mod download && go mod verify'
      - name: Verify go.mod and go.sum are tidy
        run: nix develop --command bash -c 'cd daemon && go mod tidy -diff'

  # Unit and integration jobs run across both Linux systems the
  # flake exposes. Nix can't cross-build between architectures
  # without a remote builder, so each `system` runs on a matching
  # GitHub-hosted runner: x86_64-linux on `ubuntu-latest`,
  # aarch64-linux on `ubuntu-24.04-arm` (free for public repos).
  # Darwin is not built тАФ the daemon is Linux-only and the
  # integration scenarios evaluate a NixOS module.
  unit:
    name: unit tests (${{ matrix.system }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          purge-created: 0
          purge-primary-key: never
      - name: Build unit checks
        run: nix build --print-build-logs .#checks.${{ matrix.system }}.unit

  # The `daemon` flake check runs `go test ./...` against the
  # vendored sources inside a Nix sandbox. Same matrix as unit тАФ
  # the daemon is pure-Go (CGO_ENABLED=0) so arm64 is in scope.
  daemon:
    name: daemon tests (${{ matrix.system }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          purge-created: 0
          purge-primary-key: never
      - name: Build daemon check (go test ./...)
        run: nix build --print-build-logs .#checks.${{ matrix.system }}.daemon
      - name: Build wanwatchd package
        run: nix build --print-build-logs .#checks.${{ matrix.system }}.package
      - name: Coverage gates (per PLAN ┬з9.2)
        run: nix build --print-build-logs .#checks.${{ matrix.system }}.coverage
      - name: Race detector
        run: nix build --print-build-logs .#checks.${{ matrix.system }}.race

  integration:
    name: integration tests (${{ matrix.system }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - system: x86_64-linux
            runner: ubuntu-latest
          - system: aarch64-linux
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          gc-max-store-size-linux: 5G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-
          purge-created: 0
          purge-primary-key: never
      - name: Build integration checks
        run: nix build --print-build-logs .#checks.${{ matrix.system }}.integration

  # VM tests run on x86_64-linux only. Nested KVM is reliably
  # available on free `ubuntu-latest` runners; the equivalent on
  # `ubuntu-24.04-arm` is not guaranteed and pkgs.testers.nixosTest
  # would refuse to start without `/dev/kvm`.
  #
  # Matrixed over two nixpkgs channels:
  #   - "unstable" тЖТ checks.x86_64-linux.vm-<scenario>
  #   - "stable"   тЖТ checks.x86_64-linux.vm-stable-<scenario>
  # Stable catches regressions before they ship to release users;
  # unstable surfaces the newer-kernel / newer-systemd issues
  # stable will pick up next. Independent jobs so each gets its
  # own /nix/store cache and a single channel's failure is
  # obvious in the run status.
  #
  # All scenarios build in one `nix build` invocation so the
  # NixOS-test machinery and shared store paths are realized once,
  # not ten times. `--keep-going` keeps building the rest after a
  # single scenario failure so a CI run reports every broken
  # scenario, not just the first.
  vm:
    name: vm tests (${{ matrix.channel }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - channel: unstable
            prefix: vm-
          - channel: stable
            prefix: vm-stable-
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # GitHub-hosted ubuntu-latest runners support nested
      # virtualization, but `/dev/kvm` is owned by root:kvm with
      # mode 0660 by default. The nix-daemon needs world-readable
      # access, so widen permissions via udev before installing
      # Nix. Pattern lifted from nixpkgs CI.
      - name: Enable KVM device access
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - uses: cachix/install-nix-action@08dcb3a5e62fa31e2da3d490afc4176ef55ecd72 # v30
        with:
          extra_nix_config: |
            system-features = kvm nixos-test benchmark big-parallel uid-range
      # VM gets a larger store budget тАФ the NixOS test machinery
      # alone is multiple GB, and stable + unstable pull in two
      # independent closures. Purge stays aggressive so we don't
      # blow the 10 GB per-repo cache cap when the other jobs also
      # save their stores.
      - uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569 # v7.0.2
        with:
          primary-key: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ matrix.channel }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ matrix.channel }}-
          gc-max-store-size-linux: 8G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-${{ runner.arch }}-${{ github.job }}-${{ matrix.channel }}-
          purge-created: 0
          purge-primary-key: never
      - name: Build VM checks
        run: |
          PFX=${{ matrix.prefix }}
          nix build --print-build-logs --keep-going \
            .#checks.x86_64-linux.${PFX}smoke \
            .#checks.x86_64-linux.${PFX}failover-v4 \
            .#checks.x86_64-linux.${PFX}failover-v6 \
            .#checks.x86_64-linux.${PFX}failover-dual-stack \
            .#checks.x86_64-linux.${PFX}failover-probe-loss \
            .#checks.x86_64-linux.${PFX}cold-start \
            .#checks.x86_64-linux.${PFX}recovery \
            .#checks.x86_64-linux.${PFX}hooks \
            .#checks.x86_64-linux.${PFX}metrics \
            .#checks.x86_64-linux.${PFX}family-health-policy \
            .#checks.x86_64-linux.${PFX}gateway-discovery \
            .#checks.x86_64-linux.${PFX}nftzones-integration
